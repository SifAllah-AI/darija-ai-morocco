<!-- Improved modal snippet (replace existing cityModal block) -->
<div id="cityModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="cityModalTitle" aria-describedby="cityModalDesc" data-open="true" tabindex="-1">
  <div class="glass rounded-3xl p-8 max-w-md w-full glow-green" id="cityModalPanel">
    <h2 id="cityModalTitle" class="text-3xl font-bold mb-4 text-center bg-gradient-to-r from-teal-300 to-emerald-300 bg-clip-text text-transparent">مرحبا بيك أ البطل 👋</h2>
    <p id="cityModalDesc" class="text-slate-300 mb-6 text-center">باش نعاونك مزيان، قول ليا منين نتا؟</p>

    <label for="citySelect" class="sr-only">اختار المدينة</label>
    <select id="citySelect" class="w-full bg-slate-800 border border-teal-500 rounded-xl px-4 py-3 mb-4 text-white" aria-labelledby="cityModalTitle">
      <option value="">-- اختار المدينة ديالك --</option>
      <option value="الدار البيضاء">الدار البيضاء</option>
      <option value="الرباط">الرباط</option>
      <option value="فاس">فاس</option>
      <option value="مراكش">مراكش</option>
      <option value="طنجة">طنجة</option>
      <option value="أكادير">أكادير</option>
      <option value="وجدة">وجدة</option>
      <option value="مكناس">مكناس</option>
    </select>

    <div class="flex gap-3">
      <button id="citySaveBtn" type="button" class="flex-1 bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-500 hover:to-emerald-500 py-3 rounded-xl font-bold transition-all hover:scale-105">
        بدا
      </button>
      <button id="cityCloseBtn" type="button" class="flex-1 bg-transparent border border-slate-600 py-3 rounded-xl">
        غلق
      </button>
    </div>
  </div>
</div>

<script>
  // Defer or place this at bottom; use event listeners instead of inline onclick
  (function () {
    const modal = document.getElementById('cityModal');
    const panel = document.getElementById('cityModalPanel');
    const select = document.getElementById('citySelect');
    const saveBtn = document.getElementById('citySaveBtn');
    const closeBtn = document.getElementById('cityCloseBtn');

    let previouslyFocused = null;

    function openModal() {
      previouslyFocused = document.activeElement;
      modal.dataset.open = "true";
      modal.style.display = 'flex';
      select.focus();
      document.addEventListener('keydown', onKeyDown);
    }

    function closeModal() {
      modal.dataset.open = "false";
      modal.style.display = 'none';
      document.removeEventListener('keydown', onKeyDown);
      if (previouslyFocused) previouslyFocused.focus();
    }

    function onKeyDown(e) {
      if (e.key === 'Escape') {
        closeModal();
      } else if (e.key === 'Tab') {
        // simple focus trap: keep focus inside modal
        const focusable = panel.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        if (!focusable.length) return;
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function saveCity() {
      const city = select.value;
      if (!city) {
        // optionally show validation here
        select.focus();
        return;
      }
      try {
        localStorage.setItem('userCity', city);
      } catch (err) {
        console.warn('localStorage unavailable', err);
      }
      closeModal();
      // optionally update UI to reflect chosen city
    }

    // Wire up events
    saveBtn.addEventListener('click', saveCity);
    closeBtn.addEventListener('click', closeModal);

    // If user already has a city, skip modal
    try {
      const saved = localStorage.getItem('userCity');
      if (saved) {
        modal.style.display = 'none';
      } else {
        openModal();
      }
    } catch (err) {
      // localStorage may fail in some contexts, still open the modal
      openModal();
    }
  })();
</script>
